<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💌 Ria & Jiyat</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rose:#c0566b;
      --blush:#f7dde3;
      --gold:#c9a84c;
      --dark:#1a0a10;
      --dark2:#2a1020;
      --soft:#fff9fb;
    }
    body{
      background:var(--dark);
      font-family:'Lato',sans-serif;
      height:100dvh;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* ── Login Screen ── */
    #login-screen{
      position:fixed;inset:0;z-index:100;
      background:var(--dark);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:0;padding:40px 24px;
    }
    .login-emoji{font-size:64px;margin-bottom:16px;animation:heartbeat 1.4s infinite;}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.2)}28%{transform:scale(1)}42%{transform:scale(1.1)}56%{transform:scale(1)}}
    .login-title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--soft);text-align:center;margin-bottom:6px;}
    .login-sub{font-size:0.88rem;color:#999;text-align:center;margin-bottom:36px;}
    .login-label{font-size:0.82rem;color:var(--gold);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:14px;}
    .name-btns{display:flex;gap:14px;}
    .name-btn{
      padding:16px 36px;border-radius:50px;border:none;cursor:pointer;
      font-size:1.1rem;font-family:'Playfair Display',serif;font-weight:700;
      transition:transform 0.2s,box-shadow 0.2s;
    }
    .name-btn.ria{background:var(--rose);color:#fff;box-shadow:0 4px 20px rgba(192,86,107,0.4);}
    .name-btn.jiyat{background:var(--gold);color:var(--dark);box-shadow:0 4px 20px rgba(201,168,76,0.4);}
    .name-btn:hover{transform:scale(1.06);}
    .login-note{margin-top:24px;font-size:0.78rem;color:#555;text-align:center;}

    /* ── Stars ── */
    #stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .star{position:absolute;border-radius:50%;background:white;opacity:0;animation:twinkle var(--d) ease-in-out infinite var(--delay);}
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:0.7}}

    /* ── Header ── */
    .chat-header{
      position:relative;z-index:2;
      background:var(--dark2);
      border-bottom:1px solid rgba(201,168,76,0.2);
      padding:14px 20px;
      display:flex;align-items:center;gap:14px;
      flex-shrink:0;
    }
    .header-avatar{
      width:42px;height:42px;border-radius:50%;
      background:linear-gradient(135deg,var(--rose),var(--gold));
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .header-info{flex:1;}
    .header-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--soft);}
    .header-status{font-size:0.75rem;color:#4ade80;display:flex;align-items:center;gap:5px;}
    .status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .header-heart{font-size:22px;animation:heartbeat 1.4s infinite;}
    .user-badge{
      background:rgba(201,168,76,0.15);
      border:1px solid rgba(201,168,76,0.3);
      border-radius:20px;padding:4px 12px;
      font-size:0.75rem;color:var(--gold);
      display:flex;align-items:center;gap:4px;
    }
    .logout-btn{
      background:transparent;border:none;color:#555;
      cursor:pointer;font-size:18px;padding:4px;
      transition:color 0.2s;
    }
    .logout-btn:hover{color:var(--rose);}

    /* ── Messages ── */
    #messages{
      flex:1;overflow-y:auto;
      padding:16px 14px;
      display:flex;flex-direction:column;gap:10px;
      position:relative;z-index:1;
      scroll-behavior:smooth;
    }
    #messages::-webkit-scrollbar{width:4px;}
    #messages::-webkit-scrollbar-track{background:transparent;}
    #messages::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:2px;}

    .date-divider{
      text-align:center;margin:8px 0;
      font-size:0.72rem;color:#555;
      display:flex;align-items:center;gap:10px;
    }
    .date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}

    .msg-row{display:flex;align-items:flex-end;gap:8px;}
    .msg-row.me{flex-direction:row-reverse;}
    .msg-avatar{
      width:30px;height:30px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:13px;
      background:linear-gradient(135deg,var(--rose),var(--gold));
      margin-bottom:2px;
    }
    .msg-row.me .msg-avatar{background:linear-gradient(135deg,var(--gold),#e8c47a);}

    .bubble-wrap{display:flex;flex-direction:column;max-width:72%;}
    .msg-row.me .bubble-wrap{align-items:flex-end;}
    .bubble-name{font-size:0.7rem;color:var(--gold);margin-bottom:3px;padding-left:4px;}
    .msg-row.me .bubble-name{padding-left:0;padding-right:4px;}

    .bubble{
      padding:10px 14px;border-radius:18px;
      font-size:0.92rem;line-height:1.5;
      word-break:break-word;position:relative;
    }
    .bubble.them{
      background:var(--dark2);
      border:1px solid rgba(201,168,76,0.15);
      color:var(--soft);
      border-bottom-left-radius:4px;
    }
    .bubble.me{
      background:linear-gradient(135deg,var(--rose),#a0445a);
      color:#fff;
      border-bottom-right-radius:4px;
    }
    .bubble-time{font-size:0.65rem;color:#666;margin-top:3px;padding:0 4px;}
    .msg-row.me .bubble-time{text-align:right;}

    /* ── Video Call ── */
    #vcall-overlay{
      display:none;position:fixed;inset:0;z-index:200;
      background:rgba(10,2,8,0.97);
      flex-direction:column;align-items:center;
    }
    #vcall-overlay.show{display:flex;}
    .vcall-topbar{
      width:100%;padding:12px 16px;
      display:flex;align-items:center;justify-content:space-between;
      background:var(--dark2);border-bottom:1px solid rgba(201,168,76,0.2);
      flex-shrink:0;
    }
    .vcall-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:1rem;}
    .vcall-close{
      background:var(--rose);color:#fff;border:none;
      padding:8px 18px;border-radius:20px;cursor:pointer;
      font-size:0.85rem;font-weight:700;
    }
    #jitsi-frame{width:100%;flex:1;border:none;}

    /* ── Typing indicator ── */
    .typing{display:none;align-items:center;gap:8px;padding:4px 0;}
    .typing.show{display:flex;}
    .typing-dots{display:flex;gap:4px;}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:0.4;animation:dot 1.2s infinite;}
    .typing-dots span:nth-child(2){animation-delay:0.2s;}
    .typing-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes dot{0%,60%,100%{opacity:0.4;transform:scale(1)}30%{opacity:1;transform:scale(1.3)}}
    .typing-text{font-size:0.75rem;color:#666;font-style:italic;}

    /* ── Input ── */
    .chat-input{
      position:relative;z-index:2;
      background:var(--dark2);
      border-top:1px solid rgba(201,168,76,0.15);
      padding:12px 14px;
      display:flex;align-items:flex-end;gap:10px;
      flex-shrink:0;
    }
    .input-wrap{
      flex:1;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(201,168,76,0.2);
      border-radius:24px;
      padding:10px 16px;
      display:flex;align-items:flex-end;gap:8px;
    }
    #msg-input{
      flex:1;background:transparent;border:none;outline:none;
      color:var(--soft);font-size:0.95rem;font-family:'Lato',sans-serif;
      resize:none;max-height:100px;line-height:1.4;
    }
    #msg-input::placeholder{color:#444;}
    .emoji-btn{
      background:transparent;border:none;cursor:pointer;
      font-size:20px;padding:0;line-height:1;flex-shrink:0;
      opacity:0.6;transition:opacity 0.2s;
    }
    .emoji-btn:hover{opacity:1;}
    .send-btn{
      width:46px;height:46px;border-radius:50%;border:none;
      background:linear-gradient(135deg,var(--rose),#a0445a);
      color:#fff;font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:transform 0.2s,box-shadow 0.2s;
      box-shadow:0 3px 12px rgba(192,86,107,0.4);
    }
    .send-btn:hover{transform:scale(1.1);}
    .send-btn:active{transform:scale(0.95);}

    /* ── Emoji picker ── */
    .emoji-picker{
      display:none;position:absolute;bottom:70px;left:14px;
      background:var(--dark2);border:1px solid rgba(201,168,76,0.2);
      border-radius:16px;padding:12px;
      display:none;flex-wrap:wrap;gap:6px;width:220px;
      box-shadow:0 8px 30px rgba(0,0,0,0.5);z-index:10;
    }
    .emoji-picker.show{display:flex;}
    .emoji-picker span{font-size:22px;cursor:pointer;padding:4px;border-radius:8px;transition:background 0.15s;}
    .emoji-picker span:hover{background:rgba(255,255,255,0.08);}

    /* ── Empty state ── */
    .empty-state{
      flex:1;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:10px;
      color:#444;text-align:center;padding:40px;
    }
    .empty-state .icon{font-size:48px;opacity:0.4;}
    .empty-state p{font-size:0.85rem;line-height:1.6;}
  </style>
</head>
<body>

<div id="stars"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-emoji">💌</div>
  <h1 class="login-title">Ria & Jiyat</h1>
  <p class="login-sub">Ruang pribadi kita berdua 🌹</p>
  <p class="login-label">Siapa kamu?</p>
  <div class="name-btns">
    <button class="name-btn ria" onclick="login('Ria')">🌸 Ria</button>
    <button class="name-btn jiyat" onclick="login('Jiyat')">💍 Jiyat</button>
  </div>
  <p class="login-note">Hanya Ria & Jiyat yang bisa masuk ke sini 💕</p>
</div>

<!-- CHAT -->
<div class="chat-header" style="display:none" id="chat-header">
  <div class="header-avatar" id="partner-avatar">💕</div>
  <div class="header-info">
    <div class="header-name" id="partner-name">...</div>
    <div class="header-status"><span class="status-dot"></span> Online</div>
  </div>
  <div class="user-badge">👤 <span id="my-name-badge"></span></div>
  <button class="vcall-btn" onclick="startVideoCall()" title="Video Call" style="background:linear-gradient(135deg,var(--rose),var(--gold));border:none;border-radius:20px;padding:7px 14px;color:#fff;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:700;">📹 Call</button>
  <button class="logout-btn" onclick="logout()" title="Keluar">🚪</button>
  <span class="header-heart">💖</span>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="icon">💌</div>
    <p>Belum ada pesan.<br/>Mulai kirim pesan pertamamu!</p>
  </div>
</div>

<div class="chat-input" style="display:none" id="chat-input">
  <div class="input-wrap">
    <textarea id="msg-input" placeholder="Tulis pesan..." rows="1"></textarea>
    <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
  </div>
  <button class="send-btn" onclick="sendMessage()">➤</button>
</div>

<div class="emoji-picker" id="emoji-picker">
  <span onclick="addEmoji('❤️')">❤️</span>
  <span onclick="addEmoji('😍')">😍</span>
  <span onclick="addEmoji('🥰')">🥰</span>
  <span onclick="addEmoji('😘')">😘</span>
  <span onclick="addEmoji('💕')">💕</span>
  <span onclick="addEmoji('💖')">💖</span>
  <span onclick="addEmoji('💍')">💍</span>
  <span onclick="addEmoji('🌹')">🌹</span>
  <span onclick="addEmoji('🌸')">🌸</span>
  <span onclick="addEmoji('✨')">✨</span>
  <span onclick="addEmoji('😊')">😊</span>
  <span onclick="addEmoji('🤗')">🤗</span>
  <span onclick="addEmoji('😂')">😂</span>
  <span onclick="addEmoji('🙈')">🙈</span>
  <span onclick="addEmoji('😅')">😅</span>
  <span onclick="addEmoji('💪')">💪</span>
  <span onclick="addEmoji('🙏')">🙏</span>
  <span onclick="addEmoji('👍')">👍</span>
</div>

<!-- VIDEO CALL OVERLAY -->
<div id="vcall-overlay">
  <div class="vcall-topbar">
    <div class="vcall-title">📹 Video Call — Ria & Jiyat 💕</div>
    <button class="vcall-close" onclick="endVideoCall()">✕ Tutup</button>
  </div>
  <iframe id="jitsi-frame" allow="camera; microphone; fullscreen; display-capture"></iframe>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCObu2ErcXlHD0SKJ3BU_Iiw3Dm4hI2FV8",
  authDomain: "guppycoin-58f91.firebaseapp.com",
  projectId: "guppycoin-58f91",
  storageBucket: "guppycoin-58f91.firebasestorage.app",
  messagingSenderId: "374633980019",
  appId: "1:374633980019:web:d23e33eebe19a324de0a06"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let myName = null;
let unsubscribe = null;
let lastDate = null;

// Stars
const sc = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');s.className='star';
  const size=Math.random()*2+1;
  s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:-${(Math.random()*6).toFixed(1)}s;`;
  sc.appendChild(s);
}

// Avatar & emoji per nama
const avatars = { Ria: '🌸', Jiyat: '💍' };
const partnerOf = { Ria: 'Jiyat', Jiyat: 'Ria' };

window.login = function(name) {
  myName = name;
  localStorage.setItem('chatName', name);
  startChat();
}

window.logout = function() {
  myName = null;
  localStorage.removeItem('chatName');
  if(unsubscribe) unsubscribe();
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('chat-header').style.display='none';
  document.getElementById('chat-input').style.display='none';
  document.getElementById('messages').innerHTML = '<div class="empty-state" id="empty-state"><div class="icon">💌</div><p>Belum ada pesan.<br/>Mulai kirim pesan pertamamu!</p></div>';
  lastDate = null;
}

function startChat() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('chat-header').style.display='flex';
  document.getElementById('chat-input').style.display='flex';

  const partner = partnerOf[myName];
  document.getElementById('partner-avatar').textContent = avatars[partner];
  document.getElementById('partner-name').textContent = partner;
  document.getElementById('my-name-badge').textContent = myName;

  // Listen messages
  const q = query(collection(db, 'chat-cinta'), orderBy('time'));
  unsubscribe = onSnapshot(q, (snap) => {
    const container = document.getElementById('messages');
    container.innerHTML = '';
    lastDate = null;
    if(snap.empty){
      container.innerHTML='<div class="empty-state"><div class="icon">💌</div><p>Belum ada pesan.<br/>Mulai kirim pesan pertamamu!</p></div>';
      return;
    }
    snap.forEach(doc => {
      const data = doc.data();
      if(!data.time) return;
      const d = data.time.toDate();
      const dateStr = d.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'});
      if(dateStr !== lastDate){
        const div=document.createElement('div');
        div.className='date-divider';div.textContent=dateStr;
        container.appendChild(div);lastDate=dateStr;
      }
      const isMe = data.sender === myName;
      const row=document.createElement('div');
      row.className=`msg-row ${isMe?'me':''}`;

      const avEl=document.createElement('div');
      avEl.className='msg-avatar';
      avEl.textContent=avatars[data.sender]||'👤';

      const wrap=document.createElement('div');wrap.className='bubble-wrap';
      const nameEl=document.createElement('div');nameEl.className='bubble-name';nameEl.textContent=data.sender;
      const bub=document.createElement('div');bub.className=`bubble ${isMe?'me':'them'}`;bub.textContent=data.text;
      const timeEl=document.createElement('div');timeEl.className='bubble-time';
      timeEl.textContent=d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

      wrap.appendChild(nameEl);wrap.appendChild(bub);wrap.appendChild(timeEl);
      row.appendChild(avEl);row.appendChild(wrap);
      container.appendChild(row);
    });
    container.scrollTop=container.scrollHeight;
  });
}

window.sendMessage = async function() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text || !myName) return;
  input.value='';
  input.style.height='auto';
  try {
    await addDoc(collection(db,'chat-cinta'),{
      sender: myName,
      text: text,
      time: serverTimestamp()
    });
  } catch(e){ alert('Gagal kirim: '+e.message); }
}

window.startVideoCall = function(){
  const overlay = document.getElementById('vcall-overlay');
  const frame = document.getElementById('jitsi-frame');
  // Room name fixed biar selalu sama
  frame.src = 'https://meet.jit.si/RiaJiyatPrivate2024#config.startWithVideoMuted=false&config.startWithAudioMuted=false&userInfo.displayName=' + encodeURIComponent(myName || 'Guest');
  overlay.classList.add('show');
}

window.endVideoCall = function(){
  const overlay = document.getElementById('vcall-overlay');
  const frame = document.getElementById('jitsi-frame');
  frame.src = '';
  overlay.classList.remove('show');
}

window.toggleEmoji = function(){
  document.getElementById('emoji-picker').classList.toggle('show');
}
window.addEmoji = function(e){
  const inp=document.getElementById('msg-input');
  inp.value+=e;inp.focus();
  document.getElementById('emoji-picker').classList.remove('show');
}

// Enter to send
document.getElementById('msg-input').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); window.sendMessage(); }
});
// Auto resize textarea
document.getElementById('msg-input').addEventListener('input', function(){
  this.style.height='auto';this.style.height=this.scrollHeight+'px';
});
// Close emoji picker on outside click
document.addEventListener('click', e=>{
  if(!e.target.closest('.emoji-btn') && !e.target.closest('.emoji-picker')){
    document.getElementById('emoji-picker').classList.remove('show');
  }
});

// Auto login if saved
const saved = localStorage.getItem('chatName');
if(saved === 'Ria' || saved === 'Jiyat'){
  myName = saved;
  startChat();
}
</script>
</body>
</html>
